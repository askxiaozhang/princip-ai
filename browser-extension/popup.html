<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrincipAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #18181b;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #1d3e7a;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: white;
    }

    .header p {
      font-size: 11px;
      color: #71717a;
    }

    .body { padding: 16px; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
    }

    .status.ok {
      background: #052e16;
      border: 1px solid #14532d;
      color: #86efac;
    }

    .status.err {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
    }

    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status.ok .dot { background: #22c55e; }
    .status.err .dot { background: #ef4444; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #3f3f46;
      background: #27272a;
      color: #e4e4e7;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
    }

    .field { margin-bottom: 14px; }

    button.save {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    button.save:hover { background: #1d4ed8; }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #27272a;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    .saved-msg {
      text-align: center;
      color: #22c55e;
      font-size: 12px;
      margin-top: 8px;
      min-height: 16px;
    }

    .how-to {
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .how-to p {
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🧠</div>
    <div>
      <h1>PrincipAI</h1>
      <p>前置式主动学习引擎</p>
    </div>
  </div>

  <div class="body">
    <div class="status" id="status">
      <div class="dot"></div>
      <span id="status-text">检查服务连接中…</span>
    </div>

    <div class="how-to">
      <p>在 YouTube 或 Bilibili 视频页面，点击视频标题下方的「PrincipAI 分析」按钮，即可生成学习导向包。</p>
    </div>

    <div class="field">
      <label>本地服务地址</label>
      <input
        type="text"
        id="server-url"
        placeholder="http://localhost:3000"
        value="http://localhost:3000"
      />
    </div>

    <button class="save" id="save-btn">保存设置</button>
    <div class="saved-msg" id="saved-msg"></div>
  </div>

  <div class="footer">
    <a href="https://github.com/askxiaozhang/princip-ai" target="_blank">
      GitHub · askxiaozhang/princip-ai
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
